name: openclaw-foundation-ci

on:
  pull_request:
    paths:
      - "openclaw_foundation/**"
      - ".github/workflows/openclaw-foundation-ci.yml"
  push:
    branches:
      - main
    paths:
      - "openclaw_foundation/**"
      - ".github/workflows/openclaw-foundation-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install test dependencies
        run: python -m pip install pytest

      - name: Install package
        run: python -m pip install ./openclaw_foundation

      - name: Run pytest
        run: python -m pytest openclaw_foundation/tests -q
