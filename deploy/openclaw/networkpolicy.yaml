apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: openclaw-runtime
  namespace: openclaw-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: openclaw
      app.kubernetes.io/component: runtime
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openclaw-system
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
