apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "alert-auto-investigator.fullname" . }}-reader
  labels:
    {{- include "alert-auto-investigator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "alert-auto-investigator.fullname" . }}-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "alert-auto-investigator.fullname" . }}
    namespace: {{ .Release.Namespace }}
