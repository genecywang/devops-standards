apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-server-conf
  labels:
    name: prometheus-server-conf
    team: backend-devops
    sla: prod
  namespace: monitoring
data:
  prometheus.rules: |-
    # Legacy note:
    # - `ClusterName` annotations below are kept for backward compatibility
    # - downstream routing / Slack structured alerts should prefer labels from
    #   Prometheus `external_labels` (`environment`, `cluster`)
    # - do not add new routing identity in annotations
    groups:
    - name: Reccording_rules
      rules:
        - record: node:node_used_mem_percent_perhost:rate5m
          expr: | 
            100 * (1 - ((avg_over_time(node_memory_MemFree_bytes[1h]) + avg_over_time(node_memory_Cached_bytes[1h]) + avg_over_time(node_memory_Buffers_bytes[1h])) / avg_over_time(node_memory_MemTotal_bytes[1h])))
        - record: node:node_cpu:rate2m
          expr: |
            sum(rate(container_cpu_usage_seconds_total{id="/",kubernetes_io_hostname!=""}[2m]))by(instance,karpenter_sh_nodepool)
        - record: node:node_disk_used_percent:rate15m
          expr: |
            100 - ((node_filesystem_avail_bytes{} * 100) / node_filesystem_size_bytes{})
        - record: node:node_group_total:rate10m
          expr: |
            sum(count(container_cpu_usage_seconds_total{id="/",kubernetes_io_hostname!=""})by(spec,role))
        - record: node:node_group_role:rate2m
          expr: |
            count(container_cpu_usage_seconds_total{id="/",kubernetes_io_hostname!="",node_kubernetes_io_exclude_from_external_load_balancers="",topology_ebs_csi_aws_com_zone!=""})by(karpenter_sh_nodepool)
        - record: cluster:cluster_disk_used_total:rate15m
          expr: |
            sum(node_filesystem_size_bytes{}) - sum((node_filesystem_avail_bytes{}))
        - record: cluster:cluster_disk_total:rate15m
          expr: |
            sum(node_filesystem_size_bytes{})
        - record: cluster:cluster_disk_used_percent:rate15m
          expr: |
            (cluster:cluster_disk_used_total:rate15m / cluster:cluster_disk_total:rate15m)*100
        - record: cluster:cluster_mem_used_percent:rate5m
          expr: |
            sum(container_memory_working_set_bytes{id="/",kubernetes_io_hostname !=""}) / sum(machine_memory_bytes{kubernetes_io_hostname!=""})*100
        - record: cluster:cluster_cpu_used_percent:rate1m
          expr: |
            sum(rate(container_cpu_usage_seconds_total{id="/",kubernetes_io_hostname!=""}[1m])) / sum(machine_cpu_cores{kubernetes_io_hostname!=""})*100
        - record: cluster:hpa_replica:rate3m
          expr: |
            max(kube_horizontalpodautoscaler_status_current_replicas)by(horizontalpodautoscaler)
        - record: cluster:namespace_cpu_used:rate1m
          expr: |
            sum(rate(container_cpu_usage_seconds_total{namespace !=""}[1m]))by(namespace)
        - record: cluster:cpu_all_cores:rate1m
          expr: |
            sum(machine_cpu_cores{kubernetes_io_hostname!=""})
        - record: nodegroup:cpu_used:rate1m
          expr: |
            sum(rate(container_cpu_usage_seconds_total{id="/",kubernetes_io_hostname!=""}[1m]))by(karpenter_sh_nodepool)
        - record: nodegroup:cpu_total:rate1m
          expr: |
            sum(machine_cpu_cores{kubernetes_io_hostname!=""})by(karpenter_sh_nodepool)
        - record: nodegroup:mem_used:rate5m
          expr: |
            sum(container_memory_working_set_bytes{id="/",kubernetes_io_hostname!=""})by(karpenter_sh_nodepool)
        - record: nodegroup:mem_total:rate5m
          expr: |
            sum(machine_memory_bytes{kubernetes_io_hostname!=""})by(karpenter_sh_nodepool)
        - record: cluster:namespace_cpu_request:rate1m
          expr: |
            sum(kube_pod_container_resource_requests{resource="cpu"})by(namespace)
        - record: cluster:pod_cpu_request:rate10m
          expr: |
            sum(kube_pod_container_resource_requests{resource="cpu"})by(pod)
        - record: cluster:pod_mem_request:rate10m
          expr: |
            sum(kube_pod_container_resource_requests{resource="memory"})by(pod)
        - record: cluster:namespace_cpu_total_request:rate1m
          expr: |
            sum(kube_pod_container_resource_requests{resource="cpu"})
        - record: nodegroup:node_mem_used:rate5m
          expr: |
            sum((node_memory_MemTotal_bytes{} - node_memory_Cached_bytes{} - node_memory_MemFree_bytes{}))by(instance)
        - record: nodegroup:aws_cni_assigned_ip:rate5m
          expr: |
            sum(awscni_assigned_ip_addresses{})by(instance)
        - record: nodegroup:aws_cni_max_ip:rate5m
          expr: |
            sum(awscni_total_ip_addresses{})by(instance)
        - record: cluster:pod_status:rate5m
          expr: |
            sum(kube_pod_status_phase{})by(phase)
        - record: namespace:pod_status:rate5m
          expr: |
            sum by(namespace)(kube_pod_status_phase{namespace!="kube-system",phase="Running"} == 1)
        - record: cluster:pod_1h_restart_count
          expr: |
            sum by(namespace, pod)(increase(kube_pod_container_status_restarts_total[60m]))
        - record: cluster:deployment_replica:rate5m
          expr: |
            sum(kube_deployment_status_replicas_available{app_kubernetes_io_component=""})by(deployment)
        - record: cluster:deployment_mem:rate5m
          expr: |
            sum(container_memory_working_set_bytes{image!=""}) by (pod)
        - record: cluster:deployment_cpu:rate1m
          expr: |
            sum(rate(container_cpu_usage_seconds_total{image!=""}[1m])) by (pod)
        - record: cluster:pod_oom_event:rate5m
          expr: |
            avg(kube_pod_container_status_last_terminated_reason{reason="OOMKilled"})by(pod)
        - record: pod:pod_network_tx:rate5m
          expr: |
            sum by (pod)(rate(container_network_transmit_bytes_total{}[5m])*60)
        - record: pod:pod_network_rx:rate5m
          expr: |
            sum by (pod)(rate(container_network_receive_bytes_total{}[5m])*60)
        - record: node:node_network_tx:rate5m
          expr: |
            sum by (instance)(rate(node_network_transmit_bytes_total{}[5m])*60)
        - record: node:node_network_rx:rate5m
          expr: |
            sum by (instance)(rate(node_network_receive_bytes_total{}[5m])*60)
        - record: pod:cpu_core_1m:rate1m
          expr: |
            sum(rate(container_cpu_usage_seconds_total{container!=""}[1m])) by (pod)
        - record: pod:mem_usage:rate1m
          expr: |
            sum(container_memory_working_set_bytes{container!="POD",container!=""}) by (pod)
    - name: Prometheus self-monitor for H2S-EKS-PROD-NORTHEAST-1
      rules:
      - alert: PrometheusJobMissing
        expr: absent(up{job="prometheus"})
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: Prometheus job missing (instance {{ $labels.instance }})
          description: "A Prometheus job has disappeared\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: PrometheusConfigurationReloadFailure
        expr: prometheus_config_last_reload_successful != 1
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: Prometheus configuration reload failure (instance {{ $labels.instance }})
          description: "Prometheus configuration reload error\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: PrometheusTooManyRestarts
        expr: changes(process_start_time_seconds{job=~"prometheus|pushgateway|alertmanager"}[15m]) > 2
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: Prometheus too many restarts (instance {{ $labels.instance }})
          description: "Prometheus has restarted more than twice in the last 15 minutes. It might be crashlooping.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: PrometheusAlertmanagerJobMissing
        expr: absent(up{job="alertmanager"})
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: Prometheus AlertManager job missing (instance {{ $labels.instance }})
          description: "A Prometheus AlertManager job has disappeared\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: PrometheusAlertmanagerConfigurationReloadFailure
        expr: alertmanager_config_last_reload_successful != 1
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: Prometheus AlertManager configuration reload failure (instance {{ $labels.instance }})
          description: "AlertManager configuration reload error\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: PrometheusRuleEvaluationSlow
        expr: prometheus_rule_group_last_duration_seconds > prometheus_rule_group_interval_seconds
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Prometheus rule evaluation slow (instance {{ $labels.instance }})
          description: "Prometheus rule evaluation took more time than the scheduled interval. It indicates a slower storage backend access or too complex query.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: PrometheusNotificationsBacklog
        expr: min_over_time(prometheus_notifications_queue_length[10m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: Prometheus notifications backlog (instance {{ $labels.instance }})
          description: "The Prometheus notification queue has not been empty for 10 minutes\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: PrometheusAlertmanagerNotificationFailing
        expr: rate(alertmanager_notifications_failed_total[1m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: Prometheus AlertManager notification failing (instance {{ $labels.instance }})
          description: "Alertmanager is failing sending notifications\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1

      - alert: PrometheusTargetScrapingSlow
        expr: prometheus_target_interval_length_seconds{quantile="0.9"} / on (interval, instance, job) prometheus_target_interval_length_seconds{quantile="0.5"} > 1.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Prometheus target scraping slow (instance {{ $labels.instance }})
          description: "Prometheus is scraping exporters slowly since it exceeded the requested interval time. Your Prometheus server is under-provisioned.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: PrometheusTsdbCheckpointCreationFailures
        expr: increase(prometheus_tsdb_checkpoint_creations_failed_total[1m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: Prometheus TSDB checkpoint creation failures (instance {{ $labels.instance }})
          description: "Prometheus encountered {{ $value }} checkpoint creation failures\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: PrometheusTsdbCheckpointDeletionFailures
        expr: increase(prometheus_tsdb_checkpoint_deletions_failed_total[1m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: Prometheus TSDB checkpoint deletion failures (instance {{ $labels.instance }})
          description: "Prometheus encountered {{ $value }} checkpoint deletion failures\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: PrometheusTsdbCompactionsFailed
        expr: increase(prometheus_tsdb_compactions_failed_total[1m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: Prometheus TSDB compactions failed (instance {{ $labels.instance }})
          description: "Prometheus encountered {{ $value }} TSDB compactions failures\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: PrometheusTsdbHeadTruncationsFailed
        expr: increase(prometheus_tsdb_head_truncations_failed_total[1m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: Prometheus TSDB head truncations failed (instance {{ $labels.instance }})
          description: "Prometheus encountered {{ $value }} TSDB head truncation failures\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: PrometheusTsdbReloadFailures
        expr: increase(prometheus_tsdb_reloads_failures_total[1m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: Prometheus TSDB reload failures (instance {{ $labels.instance }})
          description: "Prometheus encountered {{ $value }} TSDB reload failures\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: PrometheusTsdbWalCorruptions
        expr: increase(prometheus_tsdb_wal_corruptions_total[1m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: Prometheus TSDB WAL corruptions (instance {{ $labels.instance }})
          description: "Prometheus encountered {{ $value }} TSDB WAL corruptions\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: HostOutOfMemory
        expr: node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes * 100 < 10
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Host out of memory (instance {{ $labels.instance }})
          description: "Node memory is filling up (< 10% left)\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: HostMemoryUnderMemoryPressure
        expr: rate(node_vmstat_pgmajfault[1m]) > 1000
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: Host memory under memory pressure  (instance {{ $labels.instance }})
          description: "The node is under heavy memory pressure. High rate of major page faults\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: HostUnusualNetworkThroughputIn
        expr: sum by (instance) (rate(node_network_receive_bytes_total[2m])) / 1024 / 1024 > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Host unusual network throughput in (instance {{ $labels.instance }})
          description: "Host network interfaces are probably receiving too much data (> 100 MB/s)\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: HostUnusualNetworkThroughputOut
        expr: sum by (instance) (rate(node_network_transmit_bytes_total[2m])) / 1024 / 1024 > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Host unusual network throughput out (instance {{ $labels.instance }})
          description: "Host network interfaces are probably sending too much data (> 100 MB/s)\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: HostUnusualDiskReadRate
        expr: sum by (instance) (rate(node_disk_read_bytes_total[2m])) / 1024 / 1024 > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Host unusual disk read rate (instance {{ $labels.instance }})
          description: "Disk is probably reading too much data (> 50 MB/s)\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: HostUnusualDiskWriteRate
        expr: sum by (instance) (rate(node_disk_written_bytes_total[2m])) / 1024 / 1024 > 50
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: Host unusual disk write rate (instance {{ $labels.instance }})
          description: "Disk is probably writing too much data (> 50 MB/s)\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      # Please add ignored mountpoints in node_exporter parameters like
      # "--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|run)($|/)".
      # Same rule using "node_filesystem_free_bytes" will fire when disk fills for non-root users.
      - alert: HostOutOfDiskSpace
        expr: (node_filesystem_avail_bytes * 100) / node_filesystem_size_bytes < 10 and ON (instance, device, mountpoint) node_filesystem_readonly == 0
        # expr: (node_filesystem_avail_bytes * 100) / node_filesystem_size_bytes <= 10
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Host out of disk space (instance {{ $labels.instance }})
          description: "Disk is almost full (< 10% left)\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      # Please add ignored mountpoints in node_exporter parameters like
      # "--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|run)($|/)".
      # Same rule using "node_filesystem_free_bytes" will fire when disk fills for non-root users.
      - alert: HostDiskWillFillIn24Hours
        expr: (node_filesystem_avail_bytes * 100) / node_filesystem_size_bytes < 10 and ON (instance, device, mountpoint) predict_linear(node_filesystem_avail_bytes{fstype!~"tmpfs"}[1h], 24 * 3600) < 0 and ON (instance, device, mountpoint) node_filesystem_readonly == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: Host disk will fill in 24 hours (instance {{ $labels.instance }})
          description: "Filesystem is predicted to run out of space within the next 24 hours at current write rate\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: HostOutOfInodes
        expr: node_filesystem_files_free{mountpoint ="/rootfs"} / node_filesystem_files{mountpoint="/rootfs"} * 100 < 10 and ON (instance, device, mountpoint) node_filesystem_readonly{mountpoint="/rootfs"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Host out of inodes (instance {{ $labels.instance }})
          description: "Disk is almost running out of available inodes (< 10% left)\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: HostInodesWillFillIn24Hours
        expr: node_filesystem_files_free{mountpoint ="/rootfs"} / node_filesystem_files{mountpoint="/rootfs"} * 100 < 10 and predict_linear(node_filesystem_files_free{mountpoint="/rootfs"}[1h], 24 * 3600) < 0 and ON (instance, device, mountpoint) node_filesystem_readonly{mountpoint="/rootfs"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: Host inodes will fill in 24 hours (instance {{ $labels.instance }})
          description: "Filesystem is predicted to run out of inodes within the next 24 hours at current write rate\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: HostUnusualDiskReadLatency
        expr: rate(node_disk_read_time_seconds_total[1m]) / rate(node_disk_reads_completed_total[1m]) > 0.1 and rate(node_disk_reads_completed_total[1m]) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: Host unusual disk read latency (instance {{ $labels.instance }})
          description: "Disk latency is growing (read operations > 100ms)\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: HostUnusualDiskWriteLatency
        expr: rate(node_disk_write_time_seconds_total[1m]) / rate(node_disk_writes_completed_total[1m]) > 0.1 and rate(node_disk_writes_completed_total[1m]) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: Host unusual disk write latency (instance {{ $labels.instance }})
          description: "Disk latency is growing (write operations > 100ms)\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: HostHighCpuLoad
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Host high CPU load (instance {{ $labels.instance }})
          description: "CPU load is > 80%\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: HostCpuStealNoisyNeighbor
        expr: avg by(instance) (rate(node_cpu_seconds_total{mode="steal"}[5m])) * 100 > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Host CPU steal noisy neighbor (instance {{ $labels.instance }})
          description: "CPU steal is > 10%. A noisy neighbor is killing VM performances or a spot instance may be out of credit.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: HostCpuHighIowait
        expr: avg by (instance) (rate(node_cpu_seconds_total{mode="iowait"}[5m])) * 100 > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Host CPU high iowait (instance {{ $labels.instance }})
          description: "CPU iowait > 5%. A high iowait means that you are disk or network bound.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: HostSwapIsFillingUp
        expr: (1 - (node_memory_SwapFree_bytes / node_memory_SwapTotal_bytes)) * 100 > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: Host swap is filling up (instance {{ $labels.instance }})
          description: "Swap is filling up (>80%)\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: HostOomKillDetected
        expr: increase(node_vmstat_oom_kill[1m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: Host OOM kill detected (instance {{ $labels.instance }})
          description: "OOM kill detected\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: HostNetworkReceiveErrors
        expr: rate(node_network_receive_errs_total[2m]) / rate(node_network_receive_packets_total[2m]) > 0.01
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: Host Network Receive Errors (instance {{ $labels.instance }})
          description: "Host {{ $labels.instance }} interface {{ $labels.device }} has encountered {{ printf \"%.0f\" $value }} receive errors in the last two minutes.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: HostConntrackLimit
        expr: node_nf_conntrack_entries / node_nf_conntrack_entries_limit > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Host conntrack limit (instance {{ $labels.instance }})
          description: "The number of conntrack is approaching limit\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: KubernetesNodeReady
        expr: kube_node_status_condition{condition="Ready",status="true"} == 0
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: Kubernetes Node ready (instance {{ $labels.instance }})
          description: "Node {{ $labels.node }} has been unready for a long time\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: KubernetesContainerOomKiller
        expr: (kube_pod_container_status_restarts_total - kube_pod_container_status_restarts_total offset 10m >= 1) and ignoring (reason) min_over_time(kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}[10m]) == 1
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: Kubernetes container oom killer (instance {{ $labels.instance }})
          description: "Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} has been OOMKilled {{ $value }} times in the last 10 minutes.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: KubernetesMemoryPressure
        expr: kube_node_status_condition{condition="MemoryPressure",status="true"} == 1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Kubernetes memory pressure (instance {{ $labels.instance }})
          description: "{{ $labels.node }} has MemoryPressure condition\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: KubernetesOutOfDisk
        expr: kube_node_status_condition{condition="OutOfDisk",status="true"} == 1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Kubernetes out of disk (instance {{ $labels.instance }})
          description: "{{ $labels.node }} has OutOfDisk condition\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      # - alert: KubernetesOutOfCapacity
      #   expr: sum by (node) ((kube_pod_status_phase{phase="Running"} == 1) + on(uid) group_left(node) (0 * kube_pod_info{pod_template_hash=""})) / sum by (node) (kube_node_status_allocatable{resource="pods"}) * 100 > 90
      #   for: 2m
      #   labels:
      #     severity: warning
      #   annotations:
      #     summary: Kubernetes out of capacity (instance {{ $labels.instance }})
      #     description: "{{ $labels.node }} is out of capacity\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
      #     ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: KubernetesJobFailed
        expr: kube_job_status_failed > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: Kubernetes Job failed (instance {{ $labels.instance }})
          description: "Job {{$labels.namespace}}/{{$labels.exported_job}} failed to complete\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      # - alert: KubernetesCronjobSuspended
      #   expr: kube_cronjob_spec_suspend != 0
      #   for: 0m
      #   labels:
      #     severity: warning
      #   annotations:
      #     summary: Kubernetes CronJob suspended (instance {{ $labels.instance }})
      #     description: "CronJob {{ $labels.namespace }}/{{ $labels.cronjob }} is suspended\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
      #     ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: KubernetesPersistentvolumeclaimPending
        expr: kube_persistentvolumeclaim_status_phase{phase="Pending"} == 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: Kubernetes PersistentVolumeClaim pending (instance {{ $labels.instance }})
          description: "PersistentVolumeClaim {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is pending\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      # Investigator-ready candidate:
      # - high value
      # - clear target (instance/device/mountpoint)
      # - stable investigation path (disk usage, inode, readonly, mount)
      - alert: KubernetesVolumeOutOfDiskSpace
        expr: 100 - ((node_filesystem_avail_bytes{mountpoint="/",fstype!="rootfs"} * 100) / node_filesystem_size_bytes{mountpoint="/",fstype!="rootfs"}) > 90 and ON (instance, device, mountpoint) node_filesystem_readonly{mountpoint="/"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: Kubernetes Volume out of disk space (instance {{ $labels.instance }})
          description: "Volume is almost full (< 10% left)\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      # Investigator-ready candidate:
      # - high value
      # - clear target (persistent volume)
      # - stable investigation path (PV/PVC state, provisioner, attachment)
      - alert: KubernetesPersistentvolumeError
        expr: kube_persistentvolume_status_phase{phase=~"Failed|Pending", job="kube-state-metrics"} > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: Kubernetes PersistentVolume error (instance {{ $labels.instance }})
          description: "Persistent volume is in bad state\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: KubernetesStatefulsetDown
        expr: (kube_statefulset_status_replicas_ready / kube_statefulset_status_replicas_current) != 1
        for: 1m
        labels:
          # severity: critical
          severity: warning
        annotations:
          summary: Kubernetes StatefulSet down (instance {{ $labels.instance }})
          description: "A StatefulSet went down\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: KubernetesHpaScalingAbility
        expr: kube_horizontalpodautoscaler_status_condition{status="false", condition="AbleToScale"} == 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: Kubernetes HPA scaling ability (instance {{ $labels.instance }})
          description: "Pod is unable to scale\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: KubernetesHpaMetricAvailability
        expr: kube_horizontalpodautoscaler_status_condition{status="false", condition="ScalingActive"} == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Kubernetes HPA metric availability (instance {{ $labels.instance }})
          description: "HPA is not able to collect metrics\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      # - alert: KubernetesHpaScaleCapability
      #   expr: kube_horizontalpodautoscaler_status_desired_replicas >= kube_horizontalpodautoscaler_spec_max_replicas
      #   for: 2m
      #   labels:
      #     severity: warning
      #   annotations:
      #     summary: Kubernetes HPA scale capability (instance {{ $labels.instance }})
      #     description: "The maximum number of desired Pods has been hit\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
      #     ClusterName: H2S-EKS-PROD-NORTHEAST-1
      # Symptom-level signal:
      # - useful for triage
      # - not first-batch investigator target because root causes vary widely
      - alert: KubernetesPodNotInRunningStatus
        expr: min_over_time(sum by (namespace, pod) (kube_pod_status_phase{phase=~"Pending|Unknown|Failed"})[15m:1m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: Kubernetes Pod not in running status ({{ $labels.namespace }}/{{ $labels.pod }})
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has stayed in Pending, Unknown, or Failed for 15 minutes.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: KubernetesPodCrashLooping
        # expr: increase(kube_pod_container_status_restarts_total[3m]) > 1
        # expr: rate(kube_pod_container_status_restarts_total[5m]) * 300 > 1
        expr: rate(kube_pod_container_status_restarts_total{namespace!="monitoring"}[5m]) * 300 > 1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: Kubernetes pod crash looping ({{ $labels.namespace }}/{{ $labels.pod }})
          description: "Pod {{ $labels.pod }} is crash looping\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: KubernetesPodCrashLoopingNamespaceMonitoring
        # expr: increase(kube_pod_container_status_restarts_total[3m]) > 1
        expr: rate(kube_pod_container_status_restarts_total{namespace="monitoring"}[10m]) * 300 > 2
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: Kubernetes pod crash looping ({{ $labels.namespace }}/{{ $labels.pod }})
          description: "Pod {{ $labels.pod }} is crash looping\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: KubernetesReplicassetMismatch
        expr: kube_replicaset_spec_replicas != kube_replicaset_status_ready_replicas
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Kubernetes ReplicasSet mismatch (instance {{ $labels.instance }})
          description: "Deployment Replicas mismatch\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      # Investigator-ready candidate:
      # - high value
      # - clear target (deployment)
      # - stable investigation path (rollout, pending pods, image pull, resources)
      - alert: KubernetesDeploymentReplicasMismatch
        expr: kube_deployment_spec_replicas != kube_deployment_status_replicas_available
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Kubernetes Deployment replicas mismatch (instance {{ $labels.instance }})
          description: "Deployment Replicas mismatch\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      # Investigator-ready candidate:
      # - high value
      # - clear target (statefulset)
      # - stable investigation path (PVC, scheduling, rollout, readiness)
      - alert: KubernetesStatefulsetReplicasMismatch
        expr: kube_statefulset_status_replicas_ready != kube_statefulset_status_replicas
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Kubernetes StatefulSet replicas mismatch (instance {{ $labels.instance }})
          description: "A StatefulSet does not match the expected number of replicas.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: KubernetesDeploymentGenerationMismatch
        expr: kube_deployment_status_observed_generation != kube_deployment_metadata_generation
        for: 10m
        labels:
          # severity: critical
          severity: warning
        annotations:
          summary: Kubernetes Deployment generation mismatch (instance {{ $labels.instance }})
          description: "A Deployment has failed but has not been rolled back.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: KubernetesStatefulsetGenerationMismatch
        expr: kube_statefulset_status_observed_generation != kube_statefulset_metadata_generation
        for: 10m
        labels:
          # severity: critical
          severity: warning
        annotations:
          summary: Kubernetes StatefulSet generation mismatch (instance {{ $labels.instance }})
          description: "A StatefulSet has failed but has not been rolled back.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: KubernetesStatefulsetUpdateNotRolledOut
        expr: max without (revision) (kube_statefulset_status_current_revision unless kube_statefulset_status_update_revision) * (kube_statefulset_replicas != kube_statefulset_status_replicas_updated)
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Kubernetes StatefulSet update not rolled out (instance {{ $labels.instance }})
          description: "StatefulSet update has not been rolled out.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: KubernetesDaemonsetRolloutStuck
        expr: kube_daemonset_status_number_ready / kube_daemonset_status_desired_number_scheduled * 100 < 100 or kube_daemonset_status_desired_number_scheduled - kube_daemonset_status_current_number_scheduled > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Kubernetes DaemonSet rollout stuck (instance {{ $labels.instance }})
          description: "Some Pods of DaemonSet are not scheduled or not ready\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: KubernetesDaemonsetMisscheduled
        expr: kube_daemonset_status_number_misscheduled > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: Kubernetes DaemonSet misscheduled (instance {{ $labels.instance }})
          description: "Some DaemonSet Pods are running where they are not supposed to run\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: KubernetesCronjobTooLong
        expr: time() - kube_cronjob_next_schedule_time > 3600
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Kubernetes CronJob too long (instance {{ $labels.instance }})
          description: "CronJob {{ $labels.namespace }}/{{ $labels.cronjob }} is taking more than 1h to complete.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: KubernetesJobSlowCompletion
        expr: kube_job_spec_completions - kube_job_status_succeeded > 0
        for: 12h
        labels:
          # severity: critical
          severity: warning
        annotations:
          summary: Kubernetes job slow completion (instance {{ $labels.instance }})
          description: "Kubernetes Job {{ $labels.namespace }}/{{ $labels.job_name }} did not complete in time.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: KubernetesApiServerErrors
        expr: sum(rate(apiserver_request_total{job="kubernetes-apiservers",code=~"^(?:5..)$"}[1m])) / sum(rate(apiserver_request_total{job="kubernetes-apiservers"}[1m])) * 100 > 3
        for: 2m
        labels:
          # severity: critical
          severity: warning
        annotations:
          summary: Kubernetes API server errors (instance {{ $labels.instance }})
          description: "Kubernetes API server is experiencing high error rate\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      # - alert: KubernetesApiClientErrors
      #   expr: (sum(rate(rest_client_requests_total{code=~"(4|5).."}[1m])) by (instance, job) / sum(rate(rest_client_requests_total[1m])) by (instance, job)) * 100 > 1
      #   for: 2m
      #   labels:
      #     # severity: critical
      #     severity: warning
      #   annotations:
      #     summary: Kubernetes API client errors (instance {{ $labels.instance }})
      #     description: "Kubernetes API client is experiencing high error rate\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
      #     ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: KubernetesApiServerLatency
        expr: histogram_quantile(0.99, sum(rate(apiserver_request_latencies_bucket{subresource!="log",verb!~"^(?:CONNECT|WATCHLIST|WATCH|PROXY)$"} [10m])) WITHOUT (instance, resource)) / 1e+06 > 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: Kubernetes API server latency (instance {{ $labels.instance }})
          description: "Kubernetes API server has a 99th percentile latency of {{ $value }} seconds for {{ $labels.verb }} {{ $labels.resource }}.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: ProdPodMemoryUsageHigh
        expr: sum by(pod)(container_memory_usage_bytes{container!="POD",container!="", namespace="prod"}) > 7500000000 
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Prod pod memory usage is high"
          description: "Pod {{ $labels.pod }} memory usage is {{ $value }} bytes."
          ClusterName: H2S-EKS-PROD-NORTHEAST-1
      # - alert: PodIpReachlimit(awscni_assigned_ip_addresses)  
      #   expr: sum(awscni_assigned_ip_addresses{})by(instance) > 24
      #   for: 5m
      #   labels:
      #     severity: warning
      #   annotations:
      #     summary: "{{ $labels.instance }} : Pod ips is probably reading too much data VALUE = {{ $value }}\n "
      #     description: "m5.larage limit = 29 , m5.2xlarge limit = 58"
      #     ClusterName: H2S-EKS-PROD-NORTHEAST-1
      - alert: ClusterAutoscalerEventHappened
        expr: changes(cluster_autoscaler_nodes_count{state!=""}[10m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Cluster Autoscaler changed node count recently"
          description: "Cluster Autoscaler changed worker node count for state {{ $labels.state }} in the last 10 minutes."
          ClusterName: H2S-EKS-PROD-NORTHEAST-1

      - alert: ClusterMemoryUsageHigh
        expr: sum (container_memory_working_set_bytes{id="/",kubernetes_io_hostname !=""}) / sum (machine_memory_bytes{kubernetes_io_hostname!=""}) * 100 > 75
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Cluster memory usage is high"
          description: "Cluster memory usage is {{ $value }} percent."
          ClusterName: H2S-EKS-PROD-NORTHEAST-1

      - alert: ClusterCpuUsageHigh
        expr: sum (rate (container_cpu_usage_seconds_total{id="/",kubernetes_io_hostname!=""}[2m])) / sum (machine_cpu_cores{kubernetes_io_hostname!=""}) * 100 > 80 
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Cluster CPU usage is high"
          description: "Cluster CPU usage is {{ $value }} percent."
          ClusterName: H2S-EKS-PROD-NORTHEAST-1

      # Service health signal:
      # - keep for deploy/post-deploy observation
      # - useful for human triage
      # - not first-batch investigator target because restart alone is not root cause
      - alert: ProdPodRestartHigh
        expr: sum by (namespace, pod) (increase(kube_pod_container_status_restarts_total{namespace="prod"}[1h])) > 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Prod pod restart count is high"
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} restarted {{ $value }} times in the last hour."
          ClusterName: H2S-EKS-PROD-NORTHEAST-1

      # Notify-only / dashboard signal:
      # - useful to know something failed recently
      # - not first-batch investigator target because Failed phase is too generic
      - alert: ProdPodFailedRecently
        expr: sum by (namespace, pod) (max_over_time(kube_pod_status_phase{namespace="prod",phase="Failed"}[15m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Prod pod entered Failed phase"
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} entered Failed phase in the last 15 minutes."
          ClusterName: H2S-EKS-PROD-NORTHEAST-1

  prometheus.yml: |-
    global:
      scrape_interval: 5s
      evaluation_interval: 5s
      # Canonical source labels for downstream routing / Slack structured alerts:
      # - environment: deployment environment identifier, e.g. prod-jp
      # - cluster: stable monitoring source / cluster identifier
      external_labels:
        environment: prod-jp
        cluster: H2S-EKS-PROD-NORTHEAST-1
    rule_files:
      - /etc/prometheus/prometheus.rules
    alerting:
      alertmanagers:
      - scheme: http
        static_configs:
        - targets:
          - "alertmanager.monitoring.svc:9093"
    scrape_configs:
      - job_name: 'kubernetes-apiservers'
        kubernetes_sd_configs:
        - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
        - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
          action: keep
          regex: default;kubernetes;https
      - job_name: 'kubernetes-nodes'
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
        - role: node
        relabel_configs:
        - action: labelmap
          regex: __meta_kubernetes_node_label_(.+)
        - target_label: __address__
          replacement: kubernetes.default.svc:443
        - source_labels: [__meta_kubernetes_node_name]
          regex: (.+)
          target_label: __metrics_path__
          replacement: /api/v1/nodes/${1}/proxy/metrics
      - job_name: 'cni-metrics-helper'
        scrape_interval: 300s
        scrape_timeout: 120s
        metrics_path: /metrics      
        scheme: http
        kubernetes_sd_configs:
        - role: node
        relabel_configs:
          - source_labels: [__address__]
            action: replace
            # regex: ([^:]+)(?::\d+)
            regex: ([^:]+):.*
            replacement: $1:61678 ### the port u specific
            target_label: __address__
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
        - role: pod
        relabel_configs:
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
          action: keep
          regex: true
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
          action: replace
          target_label: __metrics_path__
          regex: (.+)
        - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
          action: replace
          regex: ([^:]+)(?::\d+)?;(\d+)
          replacement: $1:$2
          target_label: __address__
        - action: labelmap
          regex: __meta_kubernetes_pod_label_(.+)
        - source_labels: [__meta_kubernetes_namespace]
          action: replace
          target_label: kubernetes_namespace
        - source_labels: [__meta_kubernetes_pod_name]
          action: replace
          target_label: kubernetes_pod_name
      # - job_name: 'fox-discovery-testing'
      #   static_configs:
      #     - targets: ['flask-for-prome.monitoring.svc.cluster.local:5000']
      - job_name: 'kube-state-metrics'
        static_configs:
          - targets: ['kube-state-metrics.kube-system.svc.cluster.local:8080']
      - job_name: 'prom-pushgateway'
        static_configs:
          - targets: ['prom-pushgw.monitoring.svc.cluster.local:9091']
            labels:
              instance: pushgateway
      - job_name: 'alertmanager'
        static_configs:
          - targets: ['alertmanager.monitoring.svc.cluster.local:9093']
            labels:
              instance: pushgateway
      - job_name: 'kubernetes-cadvisor'
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
        - role: node
        relabel_configs:
        - action: labelmap
          regex: __meta_kubernetes_node_label_(.+)
        - target_label: __address__
          replacement: kubernetes.default.svc:443
        - source_labels: [__meta_kubernetes_node_name]
          regex: (.+)
          target_label: __metrics_path__
          replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor
      - job_name: 'kubernetes-service-endpoints'
        kubernetes_sd_configs:
        - role: endpoints
        relabel_configs:
        - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
          action: keep
          regex: true
        - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scheme]
          action: replace
          target_label: __scheme__
          regex: (https?)
        - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
          action: replace
          target_label: __metrics_path__
          regex: (.+)
        - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
          action: replace
          target_label: __address__
          regex: ([^:]+)(?::\d+)?;(\d+)
          replacement: $1:$2
        - action: labelmap
          regex: __meta_kubernetes_service_label_(.+)
        - source_labels: [__meta_kubernetes_namespace]
          action: replace
          target_label: kubernetes_namespace
        - source_labels: [__meta_kubernetes_service_name]
          action: replace
          target_label: kubernetes_name
        - source_labels: [__meta_kubernetes_service_name]
          action: drop
          regex: prometheus-node-exporter

      ############ Node Exporter Scrap Jobs ################
      # - job_name: 'prometheus-node-exporter-agent'
      #   static_configs:
      #   - targets: ['10.102.4.225:9100']
      # - job_name: 'node-exporter'
      #   kubernetes_sd_configs:
      #     - role: endpoints
      #   relabel_configs:
      #   - source_labels: [__meta_kubernetes_endpoints_name]
      #     regex: 'node-exporter'
      #     action: keep

      # ref: https://stackoverflow.com/questions/54722137/labels-from-nodes-to-daemonset-kube-prometheus-exporter-node
      - job_name: node-exporter
        kubernetes_sd_configs:
        - role: node
        relabel_configs:
        - source_labels: [__address__]
          action: replace
          regex: ([^:]+):.*
          replacement: $1:9100
          target_label: __address__
        - source_labels: [__meta_kubernetes_node_name]
          target_label: name
        - source_labels: [__meta_kubernetes_node_label_beta_kubernetes_io_arch]
          target_label: arch
        - source_labels: [__meta_kubernetes_node_label_beta_kubernetes_io_instance_type]
          target_label: instance_type
        - source_labels: [__meta_kubernetes_node_label_kubernetes_io_os]
          target_label: os
        - source_labels: [__meta_kubernetes_node_label_topology_kubernetes_io_region]
          target_label: region
        - source_labels: [__meta_kubernetes_node_label_topology_kubernetes_io_zone]
          target_label: zone
        - source_labels: [__meta_kubernetes_node_label_alpha_eksctl_io_instance_id]
          target_label: instance_id
        - source_labels: [__meta_kubernetes_node_label_role]
          target_label: role

      ############ Prometheus Scrap Jobs ################
      - job_name: prometheus
        honor_timestamps: true
        scrape_interval: 15s
        scrape_timeout: 10s
        metrics_path: /metrics
        scheme: http
        static_configs:
        - targets:
          - localhost:9090

      ############ Celery Monitoring Scrap Jobs ################
      - job_name: celery_exporter
        metrics_path: /metrics
        static_configs:
        - targets: ['prod-celery-exporter.monitoring.svc:9808']
          labels:
            env: 'prod'
        - targets: ['prod-pm-celery-exporter.monitoring.svc:9808']
          labels:
            env: 'prod'
        - targets: ['prod-st-celery-exporter.monitoring.svc:9808']
          labels:
            env: 'prod'

      - job_name: celery_flower
        metrics_path: /metrics
        static_configs:
        - targets: ['prod-celery-flower.monitoring.svc:5566']
          labels:
            env: 'prod'
      # ### CW Exporter #####
      # - job_name: cloudwatch
      #   scrape_interval: 30s
      #   metrics_path: /metrics
      #   static_configs:
      #   - targets: ['cw-2-prometheus-exporter-prometheus-cloudwatch-exporter.monitoring.svc:9106']
      #     labels:
      #       env: 'prod'
      ### GPU-metrics-Exporter #####
      - job_name: dcgm-exporter
        scrape_interval: 30s
        metrics_path: /metrics
        static_configs:
        - targets: ['dcgm-exporter.monitoring.svc:9400']
          labels:
            env: 'prod-gpu'
      - job_name: karpenter
        kubernetes_sd_configs:
        - role: endpoints
          namespaces:
            names:
            - karpenter
        relabel_configs:
        - source_labels:
          - __meta_kubernetes_endpoints_name
          - __meta_kubernetes_endpoint_port_name
          action: keep
          regex: karpenter;http-metrics
