apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: monitoring
  annotations:
      prometheus.io/scrape: 'true'
      #prometheus.io/path:   /
      prometheus.io/port:   '9093'
      #prometheus.io/port:   '8080'
spec:
  selector: 
    app: alertmanager
    sla: prod
  #type: NodePort  
  ports:
    - port: 9093
      targetPort: 9093
      #nodePort: 31000